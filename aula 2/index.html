<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    

    <script>
        var nome = prompt("Digite o seu Nome:")
        var soma = 0
        for(i = 1; i <= 3; i++) {
            var nota = prompt("Digite a nota do " + i + " bimestre:")
            soma = soma + parseInt(nota)
            console.log(soma)
        }
        var media = soma / 3
        console.log(media)

        if(media >= 7) {
            document.write(
                "<table>" +
                "<caption>BOLETIM</caption>" +
                "<tr><th>Nome:</th><td>" + nome + "</td></tr>" +
                "<tr><th>Média:</th><td>" + media +"</td></tr>" +
                "<tr><th colspan='2'>Aprovado</th></tr>" +
                "</table>"
            )
        } else {
            document.write(
                "<table>" +
                "<caption>BOLETIM</caption>" +
                "<tr><th>Nome:</th><td>" + nome + "</td></tr>" +
                "<tr><th>Média:</th><td>" + media +"</td></tr>" +
                "<tr><th colspan='2'>Reprovado</th></tr>" +
                "</table>"
            )
        }
    </script>
</body>
</html>
